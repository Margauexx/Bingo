<html>

<head>
    <title>B - I - N - G - O</title>
    <link rel="icon" type="image/png" sizes="48x48" href="assets/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background-image: url("assets/bg.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
        }
    
        /* semi-transparent overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(200, 200, 200, 0.5);
            z-index: 0;
        }
    
        .board-container,
        .right-section {
            position: relative;
            z-index: 1;
        }
    
        .board-container {
            width: 75vw;
            height: 70vh;
            margin: 20px 0 0 0;
        }
    
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
        }
    
        .bingo-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
        }
    
        .bingo-cell.highlighted {
            background-color: #a8cd89;
            font-weight: bold;
        }
    
        .bingo-left-cell {
            font-weight: bold;
            font-size: 40px;
        }
    
        .right-section {
            width: 25vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
        }
    
        .called-number {
            font-size: 80px;
            font-family: verdana;
            font-weight: bold;
            background: none;
            text-align: center;
            margin-bottom: 30px;
        }
    
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
    
        button {
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
            background-color: #23c434;
            color: white;
            border: none;
            border-radius: 5px;
        }
    
        .reset-button {
            background-color: #ff6347;
        }
    
        .reset-button:hover {
            background-color: #e55347;
        }
    </style>
</head>

<body>
    <!-- Left: Bingo board -->
    <div class="board-container">
        <div class="bingo-board" id="bingoBoard">
            <!-- Bingo grid generated here -->
        </div>
    </div>

    <!-- Right: Called number + controls -->
    <div class="right-section">
        <div class="called-number" id="calledNumber"> !!! </div>

        <div class="controls">
            <button class="reset-button" onclick="resetBoard()">RESTART BOARD</button>
            <button onclick="callNumber()">Call Number</button>
            <button class="reset-button" onclick="resetAll()">RESTART ALL</button>
        </div>
    </div>

    <script>
        const board = document.getElementById("bingoBoard");
        const calledNumberElement = document.getElementById("calledNumber");

        let calledNumbers = [];
        let allNumbers = [];

        function generateBoard() {
            board.innerHTML = "";
            const letters = ["B", "I", "N", "G", "O"];
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 16; j++) {
                    const cell = document.createElement("div");
                    cell.classList.add("bingo-cell");
                    if (j === 0) {
                        cell.textContent = letters[i];
                        cell.classList.add("bingo-left-cell");
                    } else {
                        cell.textContent = (j + (i * 15)).toString();
                    }
                    board.appendChild(cell);
                }
            }
            allNumbers = Array.from({ length: 75 }, (_, i) => i + 1);
            calledNumbers = [];
        }

        function callNumber() {
            if (allNumbers.length === 0) {
                alert("All numbers have been called!");
                return;
            }
            const index = Math.floor(Math.random() * allNumbers.length);
            const number = allNumbers.splice(index, 1)[0];
            calledNumbers.push(number);

            let letter;
            if (number <= 15) letter = "B";
            else if (number <= 30) letter = "I";
            else if (number <= 45) letter = "N";
            else if (number <= 60) letter = "G";
            else letter = "O";

            calledNumberElement.textContent = `${letter} - ${number}`;
            highlightNumber(number);
        }

        function highlightNumber(number) {
            const cells = document.querySelectorAll(".bingo-cell");
            cells.forEach(cell => {
                if (cell.textContent == number) {
                    cell.classList.add("highlighted");
                }
            });
        }

        function resetBoard() {
            generateBoard();
        }

        function resetAll() {
            generateBoard();
            calledNumberElement.textContent = "!!!";
        }

        generateBoard();
    </script>
</body>

</html>
